[server]
enableStaticServing = true

[theme]
base = "light"
primaryColor = "#D97757"
backgroundColor = "#FAF9F6"
secondaryBackgroundColor = "#F5F0EB"
textColor = "#1A1816"
font = "sans serif"

[[theme.fontFaces]]
family = "Inter"
url = "app/static/Inter-Variable.woff2"
weight = "300 700"
style = "normal"

[[theme.fontFaces]]
family = "JetBrains Mono"
url = "app/static/JetBrainsMono-Variable.woff2"
weight = "400 700"
style = "normal"
